name: Download YouTube Videos

on:
  push:
    paths: ["videos.json"]
  workflow_dispatch:

concurrency:
  group: youtube-download
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0  # Fetch all history for proper rebasing

      - name: Configure Git LFS
        run: |
          git lfs track "*.mp4"
          git lfs track "*.zip"
          git lfs track "*.part*"
          git config lfs.concurrenttransfers 10
          # Only add .gitattributes if it doesn't exist or has changes
          if [ ! -f .gitattributes ] || ! grep -q "filter=lfs" .gitattributes; then
            git add .gitattributes
          fi

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install yt-dlp
        run: |
          pip install --upgrade yt-dlp
          yt-dlp --version

      - name: Write cookies file
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "# Netscape HTTP Cookie File" > /tmp/yt-cookies.txt
            echo "# https://curl.haxx.se/rfc/cookie_spec.html" >> /tmp/yt-cookies.txt
            echo "" >> /tmp/yt-cookies.txt
            echo "$YOUTUBE_COOKIES" >> /tmp/yt-cookies.txt
            echo "COOKIES_FILE=/tmp/yt-cookies.txt" >> $GITHUB_ENV
            echo "✓ Cookies configured"
          fi

      - name: Test yt-dlp
        run: |
          if [ -f "$COOKIES_FILE" ]; then
            yt-dlp --cookies "$COOKIES_FILE" \
              --js-runtimes deno \
              --remote-components ejs:npm \
              --simulate \
              "https://www.youtube.com/watch?v=jNQXAC9IVRw" 2>&1 | tee test.log
            if grep -q "Sign in to confirm" test.log; then
              echo "❌ Cookie authentication failed"
              exit 1
            fi
            echo "✅ Test successful"
          fi

      - name: Process pending videos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python scripts/process.py

      - name: Commit and push videos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are any changes to commit
          if git status --porcelain | grep -q .; then
            echo "Changes detected, committing..."
          
            # Add all changes (videos, metadata, updated videos.json)
            git add videos/ videos.json VIDEOS.md .gitattributes 2>/dev/null || true
            git add *.mp4 *.zip 2>/dev/null || true
          
            # Commit changes
            git commit -m "chore: add downloaded videos [skip ci]"
          
            # Push without rebase to avoid conflicts
            git push origin HEAD:${{ github.ref_name }} --force-with-lease || \
            git pull origin ${{ github.ref_name }} --no-rebase && \
            git push origin HEAD:${{ github.ref_name }}
          
            echo "✅ Changes pushed to repository"
          else
            echo "No changes to commit"
          fi