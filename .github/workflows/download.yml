name: Download YouTube Videos

on:
  push:
    paths: ["videos.json"]
  workflow_dispatch:

concurrency:
  group: youtube-download
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install latest QuickJS from source
        run: |
          # Remove old version if exists
          sudo apt-get remove -y quickjs || true
          
          # Install build dependencies
          sudo apt-get update
          sudo apt-get install -y git make gcc libc6-dev
          
          # Clone and build latest QuickJS
          git clone https://github.com/bellard/quickjs.git /tmp/quickjs
          cd /tmp/quickjs
          make
          
          # Install to /usr/local/bin
          sudo cp qjs qjsc /usr/local/bin/
          
          # Verify installation
          /usr/local/bin/qjs --help | head -5
          echo "QuickJS installed successfully"
          
          # Show version info (newer versions support --version)
          /usr/local/bin/qjs -e "console.log('QuickJS version:', typeof version !== 'undefined' ? version : 'unknown')"

      - name: Install yt-dlp
        run: |
          pip install --upgrade yt-dlp
          yt-dlp --version

      - name: Write cookies file
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > /tmp/yt-cookies.txt
            echo "COOKIES_FILE=/tmp/yt-cookies.txt" >> $GITHUB_ENV
            echo "Cookies file configured"
            ls -la /tmp/yt-cookies.txt
          else
            echo "No cookies provided - downloads may be limited"
          fi

      - name: Test yt-dlp with QuickJS
        run: |
          echo "Testing yt-dlp with QuickJS runtime..."
          # Test with a simple public video
          yt-dlp --js-runtimes /usr/local/bin/qjs --simulate \
            --extractor-args "youtube:player_client=web" \
            "https://www.youtube.com/watch?v=jNQXAC9IVRw" 2>&1 | tee test.log
          
          # Check if test passed
          if grep -q "n challenge" test.log; then
            echo "ERROR: QuickJS not working properly"
            exit 1
          fi
          echo "Test successful"

      - name: Process pending videos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # Set explicit path to QuickJS
          YTDLP_JS_RUNTIME: /usr/local/bin/qjs
        run: |
          python scripts/process.py

      - name: Commit updated videos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git diff --staged --quiet || \
            git commit -m "chore: update download statuses [skip ci]" && \
            git push